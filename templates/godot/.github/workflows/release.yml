name: Godot App Release

on:
  workflow_dispatch:

env:
  pname: "godot-game" # package name, preferably in kebab-case, WARN: MUST BE THE SAME AS THE PNAME ON THE FLAKE.NIX
  itch-user: ""
  extra-channel: ["stable"]

defaults:
  run:
    shell: nu {0}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        preset: [linux, windows]

    steps:
      - uses: actions/checkout@v3
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: hustcer/setup-nu@v3
        with:
          version: "0.112.2"
          enable-plugins: true

      - name: Get Info
        run: |
          $env.preset = ${{matrix.preset}}
          $env.version = open project.godot | from ini | get application?.'config/version'? | default '1.0.0'
          $env.name = open project.godot | from ini | get application?.'config/name'? | default 'Godot Game'

      - name: Build ${{matrix.preset}} preset
        run: nix build .#${{matrix.preset}}

      - name: preparing zips
        run: |
          mkdir -v ./out/($env.pname)
          cp -rv ./result/share/($env.pname)/* ./out/($env.pname)
          cd ./out/($env.pname)
          ^zip ../($env.pname)-($env.preset).zip *

      - name: Upload package to GitHub release
        if: "!env.ACT"
        uses: ncipollo/release-action@v1.20.0
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: ./out/${{env.pname}}-${{matrix.preset}}.zip
          artifactContentType: zip
          bodyFile: ./bodyfile.md
          tag: ${{ env.version }}
          name: "${{ env.name }} ${{ env.version }}"

      - name: setup butler
        if: env.itch-user != '' && !env.ACT
        uses: remarkablegames/setup-butler@v2
        with:
          butler-version: LATEST

      - name: upload to itch
        if: env.itch-user != '' && !env.ACT
        run: |
          ^butler push \
            --fix-permissions \
            --userversion=$env.version \
            ./result/share/($env.pname) \
            [$"($env.itch-user)/($env.pname):($env.preset)" ...$env.extra-channel] | str join "-"
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_CREDENTIALS }}
